# Config for `cargo deny check`, referenced by SECURITY.md.
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Narrow, dated exemptions for "unmaintained" advisories with no available fix,
# all pulled in transitively (deno_core/selectors/v8), not by our own direct
# deps. Re-check on the next `cargo update` in case an upgrade path appears.
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is unmaintained with no successor upgrade; pulled in transitively via deno_core. No safe upgrade available as of 2026-07-21." },
    { id = "RUSTSEC-2025-0057", reason = "fxhash 0.2.1 is unmaintained; pulled in transitively via selectors (obscura-dom). No safe upgrade available as of 2026-07-21." },
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 is unmaintained; pulled in transitively via v8/serde_v8. No safe upgrade available as of 2026-07-21." },
]

[licenses]
confidence-threshold = 0.8
# Every license currently in use across the dependency tree (`cargo deny
# list`), minus LGPL-2.1-or-later: that license only appears via r-efi's
# "MIT OR Apache-2.0 OR LGPL-2.1-or-later" triple license, and r-efi is only
# pulled in as a target dependency of getrandom on UEFI, a target this
# project doesn't build for. Leaving it off keeps the allow list
# permissive-only; r-efi still passes under its MIT/Apache-2.0 option.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
# A hard deny here breaks on the next routine dependency bump for reasons
# unrelated to security (e.g. two crates pinning different semver-incompatible
# versions of a common dep); keep it a warning rather than a CI failure.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
